<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG的MBTI診断</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1>🎲 TRPG的MBTI診断</h1>
            <p class="subtitle">あなたのTRPGプレイスタイルを診断します</p>
            <div class="description">
                <p>20の質問に答えることで、あなたのTRPGにおけるプレイヤータイプを診断します。</p>
                <p>プレイヤー(PL)としての特徴とゲームマスター(GM)としての特徴の両方がわかります。</p>
            </div>
        </header>

        <!-- 質問セクション -->
        <section id="questions" class="questions-section">
            <!-- 質問はJavaScriptで動的に生成 -->
        </section>

        <!-- 診断ボタン -->
        <div id="submit-section" class="submit-section" style="display: none;">
            <button id="submit-btn" class="submit-btn">診断結果を見る</button>
            <p class="warning-text" id="warning-text" style="display: none;">すべての質問に回答してください</p>
        </div>

        <!-- 結果セクション -->
        <section id="result" class="result-section" style="display: none;">
            <h2 class="result-title">診断結果</h2>
            
            <div class="result-card">
                <div class="type-header">
                    <div class="type-code" id="type-code"></div>
                    <div class="type-name" id="type-name"></div>
                </div>

                <div class="type-group" id="type-group"></div>

                <div class="traits" id="traits"></div>

                <div class="result-content">
                    <div class="section">
                        <h3>PLのあなた</h3>
                        <div id="pl-description"></div>
                    </div>

                    <div class="section">
                        <h3>GMのあなた</h3>
                        <div id="gm-description"></div>
                    </div>

                    <div class="section">
                        <h3>得意なプレイスタイル</h3>
                        <div id="playstyle"></div>
                    </div>
                </div>

                <!-- 共有セクション -->
                <div class="share-section">
                    <button id="copy-result-btn" class="share-btn">結果をコピー</button>
                    <button id="copy-url-btn" class="share-btn secondary">URLをコピー</button>
                    <p class="copy-message" id="copy-message" style="display: none;">コピーしました！</p>
                </div>

                <button id="restart-btn" class="restart-btn">もう一度診断する</button>
            </div>
        </section>
    </div>

    <script src="questions.js"></script>
    <script src="results.js"></script>
    <script src="app.js"></script>
</body>
</html>
